<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Placed — Gala Parfume</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div data-nav></div>

<section class="section" style="min-height:60vh;display:flex;align-items:center;">
  <div class="wrap" style="text-align:center;max-width:520px;">
    <div class="feat">
      <div class="ico" style="width:70px;height:70px;border-color:var(--green);color:var(--green);">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h2>Order Placed Successfully</h2>
      <p>Thank you! Your order <strong id="orderCode"></strong> has been received and is now pending confirmation. We'll verify your payment shortly.</p>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:20px;">
        <a href="orders.html" class="btn btn-gold">View My Orders</a>
        <a href="index.html" class="btn btn-line">Back to Home</a>
      </div>
    </div>
  </div>
</section>

<div data-footer></div>
<script src="js/store.js"></script>
<script src="js/ui.js"></script>
<script>
  UI.mountChrome('', '');
  const id = new URLSearchParams(location.search).get('id');
  document.getElementById('orderCode').textContent = '#' + (id || '');
</script>
</body>
</html>
